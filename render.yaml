services:
  - type: web
    name: desinfolab-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATA_DIR
        value: /data
      - key: PYTHON_VERSION
        value: 3.11.9
    disk:
      name: desinfolab-data
      mountPath: /data
      sizeGB: 1
