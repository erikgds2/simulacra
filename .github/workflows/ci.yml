name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Security audit (pip)
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --ignore-vuln GHSA-p5gq-h7wr-vgk4 || true

      - name: Create .env for tests
        working-directory: backend
        run: |
          echo "ANTHROPIC_API_KEY=sk-ant-test-key-for-ci" > .env
          echo "ENVIRONMENT=test" >> .env
          echo "ALLOWED_ORIGINS=http://localhost:5173" >> .env

      - name: Run tests
        working-directory: backend
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=xml
        env:
          PYTHONPATH: .

      - name: Upload coverage
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303 # v5.1.2
        if: always()
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  frontend-build:
    name: Frontend Build (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Security audit (npm)
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

      - name: Check build output
        working-directory: frontend
        run: |
          test -d dist && echo "✅ Build gerado com sucesso"
          ls -la dist/

  validate-render-config:
    name: Validate Render Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check render.yaml exists
        run: test -f render.yaml && echo "render.yaml encontrado"

      - name: Check Procfile exists
        run: test -f backend/Procfile && echo "Procfile encontrado"

      - name: Check runtime.txt exists
        run: test -f backend/runtime.txt && echo "runtime.txt encontrado"

      - name: Validate render.yaml syntax
        run: |
          python3 -c "
          import yaml, sys
          with open('render.yaml') as f:
              config = yaml.safe_load(f)
          services = config.get('services', [])
          assert len(services) > 0, 'Nenhum servico em render.yaml'
          svc = services[0]
          assert svc.get('name'), 'name ausente'
          assert svc.get('buildCommand'), 'buildCommand ausente'
          assert svc.get('startCommand'), 'startCommand ausente'
          print('render.yaml valido')
          "

  codeql-analysis:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        with:
          languages: python, javascript
      - name: Autobuild
        uses: github/codeql-action/autobuild@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
